services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-8002}:${API_PORT:-8002}"
    volumes:
      - backend_data:/app/data
      - backend_session:/app/session
      - backend_output:/app/output_profiles
      - backend_logs:/app/logs
      - backend_profile:/app/twitter_profile
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT:-8002}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* di-bake saat build — isi dengan URL publik VPS
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

volumes:
  backend_data:
  backend_session:
  backend_output:
  backend_logs:
  backend_profile:

networks:
  app_network:
    driver: bridge
